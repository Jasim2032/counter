<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Name: Muhammad Jasim ID: 74407 </title>
    <!-- Font  icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2.5rem 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 2rem;
            color: #333;
        }

        .counter-display {
            margin-bottom: 2rem;
        }

        #counterValue {
            font-size: 4rem;
            font-weight: bold;
            color: #222; /* default dark grey */
            transition: color 0.2s ease;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            font-size: 1.1rem;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            background-color: #222;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #444;
            transform: scale(1.05);
        }

        .btn i {
            font-size: 1.1rem;
        }

        /* Individual button colors (optional) */
        #decrease { background-color: #dc3545; }
        #reset { background-color: #6c757d; }
        #increase { background-color: #28a745; }

        #decrease:hover { background-color: #c82333; }
        #reset:hover { background-color: #5a6268; }
        #increase:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counter</h1>
        <div class="counter-display">
            <span id="counterValue">0</span>
        </div>
        <div class="buttons" id="buttonContainer">
            <button class="btn" id="decrease"><i class="fas fa-minus"></i> DECREASE</button>
            <button class="btn" id="reset"><i class="fas fa-undo-alt"></i> RESET</button>
            <button class="btn" id="increase"><i class="fas fa-plus"></i> INCREASE</button>
        </div>
    </div>
    
    <script>
        // Get references to DOM elements
        const counterSpan = document.getElementById('counterValue');
        const buttonContainer = document.getElementById('buttonContainer');

  
        let counter = 0;

        // Function to update the display and color based on counter value
        function updateDisplay() {
            counterSpan.innerText = counter;

           
            if (counter > 0) {
                counterSpan.style.color = '#28a745'; // green
            } else if (counter < 0) {
                counterSpan.style.color = '#dc3545'; // red
            } else {
                counterSpan.style.color = '#222'; // dark grey
            }
        }

      
        updateDisplay();

      
        buttonContainer.addEventListener('click', (e) => {
          
            if (e.target.classList.contains('btn')) {
                // Determine which button was clicked using its id
                if (e.target.id === 'decrease') {
                    counter--;
                } else if (e.target.id === 'reset') {
                    counter = 0;
                } else if (e.target.id === 'increase') {
                    counter++;
                }

                // Update the display with new value and color
                updateDisplay();
            }
        });
    </script>
</body>
</html>
