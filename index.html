</head>
<body>
    <div class="container">
        <h1>Counter</h1>
        <div class="counter-display">
            <span id="counterValue">0</span>
        </div>
        <div class="buttons" id="buttonContainer">
            <button class="btn" id="decrease"><i class="fas fa-minus"></i> DECREASE</button>
            <button class="btn" id="reset"><i class="fas fa-undo-alt"></i> RESET</button>
            <button class="btn" id="increase"><i class="fas fa-plus"></i> INCREASE</button>
        </div>
    </div>
</body>
